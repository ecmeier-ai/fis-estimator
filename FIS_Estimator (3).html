<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FIS Estimator">
<meta name="theme-color" content="#1c2610">
<title>FIS Estimator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f5f4f0;color:#1c2610;min-height:100vh;}
input,select,textarea,button{font-family:inherit;}
input[type=text],input[type=email],input[type=tel],input[type=date],input[type=number],select{font-size:16px;-webkit-appearance:none;appearance:none;}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;}
.header{background:#1c2610;padding:0 16px;display:flex;align-items:center;}
.hi{flex:1;display:flex;align-items:center;gap:12px;padding:12px 0;}
.hi img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.hn{color:white;font-weight:700;font-size:14px;line-height:1.2;}
.hs{color:#6b8c2a;font-size:11px;}
.tabs{display:flex;}
.tab{padding:10px 14px;border:none;background:transparent;color:#777;font-size:13px;font-weight:500;border-radius:6px 6px 0 0;white-space:nowrap;}
.tab.on{background:#f5f4f0;color:#1c2610;}
.main{max-width:960px;margin:0 auto;padding:18px 14px;display:flex;flex-direction:column;gap:14px;}
.card{background:white;border-radius:12px;padding:18px;border:1px solid #e8e6e0;}
.slbl{font-size:11px;font-weight:700;color:#4a5e23;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;}
@media(max-width:600px){.g2{grid-template-columns:1fr;}.g3{grid-template-columns:1fr 1fr 1fr;}}
.fld{display:flex;flex-direction:column;gap:4px;}
.fld label{font-size:12px;font-weight:500;color:#666;}
.fld input,.fld textarea{width:100%;padding:10px 12px;border:1px solid #e0ddd6;border-radius:8px;background:white;outline:none;}
.fld input:focus,.fld textarea:focus{border-color:#4a5e23;}
.fld textarea{resize:vertical;min-height:80px;font-size:15px;line-height:1.5;}
.sw{position:relative;}
.sw::after{content:"\25BE";position:absolute;right:11px;top:50%;transform:translateY(-50%);color:#888;pointer-events:none;font-size:11px;}
.sw select{width:100%;padding:10px 28px 10px 12px;border:1px solid #e0ddd6;border-radius:8px;background:white;outline:none;}
.srow{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.srow input{flex:1;min-width:150px;padding:9px 12px;border:1px solid #e0ddd6;border-radius:8px;font-size:15px;outline:none;}
.pscroll{max-height:210px;overflow-y:auto;border:1px solid #f0ede6;border-radius:8px;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:#f5f3ef;padding:7px 10px;text-align:left;font-weight:500;color:#666;position:sticky;top:0;z-index:1;}
tbody tr{border-top:1px solid #f0ede6;}
tbody tr:nth-child(even){background:#faf9f7;}
td{padding:6px 10px;vertical-align:middle;}
.pnum{font-family:monospace;font-size:11px;color:#777;}
.pr{text-align:right;font-weight:500;white-space:nowrap;}
.pm{color:#e08020;}
.abtn{background:#4a5e23;color:white;border:none;border-radius:5px;padding:5px 12px;font-size:12px;font-weight:600;}
.ltbl th{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;padding:5px 0 5px 4px;border-bottom:2px solid #f0ede6;}
.ltbl td{padding:7px 4px;border-bottom:1px solid #f5f3ef;vertical-align:middle;}
.ld{font-size:13px;font-weight:500;}
.lp{font-size:11px;color:#bbb;font-family:monospace;}
.qi{width:52px;text-align:center;padding:5px 4px;border:1px solid #e0ddd6;border-radius:6px;font-size:14px;}
.pi{width:80px;text-align:right;padding:5px 6px;border:1px solid #e0ddd6;border-radius:6px;font-size:14px;}
.pi.miss{border-color:#e08020;}
.xbtn{background:none;border:none;color:#ccc;font-size:20px;padding:0 4px;line-height:1;}
.lbrow{display:grid;grid-template-columns:1fr 68px 78px 78px 28px;gap:8px;align-items:end;margin-bottom:10px;}
.lbrow select{padding:8px 10px;border:1px solid #e0ddd6;border-radius:7px;font-size:13px;background:white;width:100%;appearance:none;-webkit-appearance:none;}
.lbrow input{padding:8px 6px;border:1px solid #e0ddd6;border-radius:7px;font-size:14px;text-align:right;width:100%;}
.ll{font-size:10px;color:#999;margin-bottom:3px;}
@media(max-width:500px){.lbrow{grid-template-columns:1fr 58px 68px 68px 24px;gap:5px;}}
.pua{border:2px dashed #c8d4b0;border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:#fafcf7;position:relative;}
.pua:hover,.pua.drag{border-color:#4a5e23;background:#f3f7ec;}
.pua input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-top:14px;}
.pt{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;border:1px solid #e0ddd6;}
.pt img{width:100%;height:100%;object-fit:cover;display:block;}
.pc{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);padding:3px 6px;}
.pc input{background:transparent;border:none;color:white;font-size:11px;width:100%;outline:none;padding:0;}
.pc input::placeholder{color:rgba(255,255,255,.5);}
.prm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);border:none;color:white;border-radius:50%;width:20px;height:20px;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;}
.tbar{background:#1c2610;border-radius:12px;padding:16px 18px;display:flex;align-items:center;flex-wrap:wrap;gap:10px;}
.ti{flex:1;min-width:80px;}
.tl{font-size:11px;color:#888;margin-bottom:2px;}
.tv{font-size:16px;font-weight:600;color:white;}
.tg{font-size:21px;font-weight:800;color:#6b8c2a;}
.tdiv{width:1px;height:36px;background:#333;flex-shrink:0;}
.abtns{display:flex;gap:8px;flex-wrap:wrap;}
.bs{background:#2a3518;color:#ccc;border:1px solid #444;border-radius:8px;padding:11px 15px;font-size:13px;font-weight:500;white-space:nowrap;}
.bp{background:#4a5e23;color:white;border:none;border-radius:8px;padding:11px 16px;font-size:13px;font-weight:600;white-space:nowrap;}
.bs:active,.bp:active{opacity:.8;}
.pvbar{background:white;border-bottom:1px solid #e8e6e0;padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.bback{background:none;border:1px solid #e0ddd6;border-radius:7px;padding:9px 14px;font-size:13px;color:#555;}
.prop{max-width:760px;margin:20px auto 40px;background:white;border-radius:12px;overflow:hidden;border:1px solid #e8e6e0;box-shadow:0 4px 20px rgba(0,0,0,.06);}
.ph{background:#1c2610;padding:26px 34px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;}
.plr{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.plr img{width:48px;height:48px;border-radius:8px;object-fit:cover;}
.pco{color:white;font-weight:700;font-size:16px;}
.ptag{color:#6b8c2a;font-size:11px;letter-spacing:.08em;font-weight:500;}
.pct{color:#888;font-size:12px;line-height:1.9;margin-top:5px;}
.pnl{color:#6b8c2a;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;text-align:right;}
.pnum-v{color:white;font-weight:700;font-size:20px;text-align:right;}
.pmt{color:#888;font-size:12px;line-height:1.9;text-align:right;margin-top:5px;}
.pb{padding:26px 34px;}
.psl{font-size:10px;font-weight:700;color:#4a5e23;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.pdiv{border:none;border-top:1px solid #f0ede6;margin:18px 0;}
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:20px;}
@media(max-width:520px){.pg2{grid-template-columns:1fr;}}
.pcn{font-weight:700;font-size:15px;margin-bottom:2px;}
.pcd{font-size:13px;color:#666;line-height:1.7;}
.ptbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:18px;}
.ptbl th{text-align:left;padding:6px 0;font-weight:600;color:#555;font-size:11px;border-bottom:2px solid #1c2610;}
.ptbl th.r,.ptbl td.r{text-align:right;}
.ptbl td{padding:7px 0;border-bottom:1px solid #f0ede6;}
.ptbl tr:nth-child(even) td{background:#faf9f7;}
.ptbox{display:flex;justify-content:flex-end;margin-bottom:20px;}
.pti{width:260px;}
.ptr{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:#666;border-bottom:1px solid #f0ede6;}
.ptg{display:flex;justify-content:space-between;padding:10px 0;border-bottom:2px solid #1c2610;}
.ptgl{font-weight:700;font-size:15px;}
.ptgv{font-weight:800;font-size:17px;color:#4a5e23;}
.pnotes{background:#faf9f7;border-radius:8px;border:1px solid #f0ede6;padding:14px;margin-bottom:18px;}
.pnotes p{font-size:12px;color:#555;line-height:1.7;white-space:pre-wrap;}
.ppg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;margin-bottom:18px;}
.ppi{border-radius:6px;overflow:hidden;border:1px solid #e8e6e0;}
.ppi img{width:100%;display:block;aspect-ratio:4/3;object-fit:cover;}
.ppic{font-size:10px;color:#888;padding:4px 6px;background:#faf9f7;text-align:center;}
@media(max-width:500px){.ppg{grid-template-columns:repeat(2,1fr);}}
.psig{display:grid;grid-template-columns:1fr 1fr;gap:32px;border-top:2px solid #f0ede6;padding-top:20px;}
@media(max-width:500px){.psig{grid-template-columns:1fr;}}
.sln{border-bottom:1px solid #ccc;height:34px;margin-bottom:5px;}
.sc{font-size:11px;color:#aaa;}
.sn{font-size:11px;color:#ccc;margin-top:10px;line-height:1.6;}
@media print{
  .no-print{display:none!important;}
  body{background:white;}
  .prop{box-shadow:none;border:none;margin:0;border-radius:0;}
  .ppg{page-break-inside:avoid;}
}
</style>
</head>

function buildEstimate(){
  var PARTS=fp();
  var prows=parts.map(function(p){
    return '<tr><td class="pnum">'+esc(p.pn)+'</td><td>'+esc(p.desc)+'</td>'
      +'<td class="pr '+(p.price?"":"pm")+'">'+(p.price?fmt(p.price):"Set cost")+'</td>'
      +'<td><button class="abtn" onclick="addPart(''+p.pn+'')">+ Add</button></td></tr>';
  }).join("");

  var lrows="";
  if(S.lines.length){
    lrows='<div style="margin-top:14px;"><div class="slbl" style="margin-bottom:8px;">Selected parts</div>'
      +'<table class="ltbl"><thead><tr><th>Description</th><th style="text-align:center;width:58px;">Qty</th>'
      +'<th style="text-align:right;width:90px;">Unit price</th><th style="text-align:right;width:86px;">Total</th><th style="width:28px;"></th></tr></thead><tbody>';
    S.lines.forEach(function(l){
      lrows+='<tr><td><div class="ld">'+esc(l.desc)+'</div><div class="lp">'+esc(l.pn)+'</div></td>'
        +'<td style="text-align:center;"><input class="qi" type="number" min="1" value="'+l.qty+'" onchange="updateQty(''+l.pn+'',this.value)"></td>'
        +'<td style="text-align:right;"><input class="pi '+(l.unitPrice==null?"miss":"")+'" type="number" step="0.01" value="'+(l.unitPrice!=null?l.unitPrice:"")+'" placeholder="Enter" onchange="updatePrice(''+l.pn+'',this.value)"></td>'
        +'<td style="text-align:right;font-weight:600;">'+(l.unitPrice!=null?fmt(l.unitPrice*l.qty):"--")+'</td>'
        +'<td><button class="xbtn" onclick="removeLine(''+l.pn+'')">&#215;</button></td></tr>';
    });
    lrows+='</tbody></table></div>';
  }

  var labrows=S.labor.map(function(l){
    var opts=LABOR_PRESETS.map(function(p){return'<option'+(p.label===l.label?' selected':'')+'>'+esc(p.label)+'</option>';}).join("");
    return '<div class="lbrow"><div><div class="ll">Description</div><select onchange="updateLabor('+l.id+','label',this.value)">'+opts+'</select></div>'
      +'<div><div class="ll">Hours</div><input type="number" step="0.5" min="0" value="'+l.hours+'" onchange="updateLabor('+l.id+','hours',this.value)"></div>'
      +'<div><div class="ll">Rate/hr</div><input type="number" step="1" min="0" value="'+l.rate+'" onchange="updateLabor('+l.id+','rate',this.value)"></div>'
      +'<div style="display:flex;align-items:flex-end;padding-bottom:2px;font-weight:600;font-size:13px;justify-content:flex-end;">'+fmt(l.hours*l.rate)+'</div>'
      +'<div style="display:flex;align-items:flex-end;padding-bottom:2px;"><button class="xbtn" onclick="removeLabor('+l.id+')">&#215;</button></div></div>';
  }).join("");

  var pthumbs=S.photos.map(function(p){
    return '<div class="pt"><img src="'+p.dataUrl+'" alt="site photo">'
      +'<div class="pc"><input type="text" value="'+esc(p.caption)+'" placeholder="Add caption..." onchange="updateCaption('+p.id+',this.value)"></div>'
      +'<button class="prm" onclick="removePhoto('+p.id+')">&#215;</button></div>';
  }).join("");

  var catOpts=CATS.map(function(c){return'<option'+(c===S.filterCat?' selected':'')+'>'+c+'</option>';}).join("");
  var jobOpts=JOB_TYPES.map(function(t){return'<option'+(t===S.job.type?' selected':'')+'>'+t+'</option>';}).join("");

  return '<div class="main">'
    +'<div class="g2">'
    +'<div class="card"><div class="slbl">Customer info</div>'
    +'<div style="display:flex;flex-direction:column;gap:10px;">'
    +'<div class="fld"><label>Company name</label><input type="text" value="'+esc(S.co.company)+'" oninput="S.co.company=this.value" placeholder="AdventHealth DeLand"></div>'
    +'<div class="g2"><div class="fld"><label>Contact name</label><input type="text" value="'+esc(S.co.contact)+'" oninput="S.co.contact=this.value" placeholder="Jennifer Walsh"></div>'
    +'<div class="fld"><label>Phone</label><input type="tel" value="'+esc(S.co.phone)+'" oninput="S.co.phone=this.value" placeholder="(386) 943-4522"></div></div>'
    +'<div class="fld"><label>Email</label><input type="email" value="'+esc(S.co.email)+'" oninput="S.co.email=this.value" placeholder="contact@company.com"></div>'
    +'<div class="fld"><label>Address</label><input type="text" value="'+esc(S.co.address)+'" oninput="S.co.address=this.value" placeholder="700 E Plymouth Ave"></div>'
    +'<div class="g3"><div class="fld"><label>City</label><input type="text" value="'+esc(S.co.city)+'" oninput="S.co.city=this.value" placeholder="DeLand"></div>'
    +'<div class="fld"><label>State</label><input type="text" value="'+esc(S.co.state)+'" oninput="S.co.state=this.value"></div>'
    +'<div class="fld"><label>Zip</label><input type="text" value="'+esc(S.co.zip)+'" oninput="S.co.zip=this.value" placeholder="32720"></div></div>'
    +'</div></div>'
    +'<div class="card"><div class="slbl">Job details</div>'
    +'<div style="display:flex;flex-direction:column;gap:10px;">'
    +'<div class="fld"><label>Job type</label><div class="sw"><select onchange="S.job.type=this.value">'+jobOpts+'</select></div></div>'
    +'<div class="fld"><label>Proposal date</label><input type="date" value="'+S.job.date+'" onchange="S.job.date=this.value"></div>'
    +'<div class="fld"><label>Scope of work</label><textarea oninput="S.job.scope=this.value" placeholder="Describe the work -- this appears on the proposal.">'+esc(S.job.scope)+'</textarea></div>'
    +'</div></div></div>'

    +'<div class="card"><div class="slbl">Parts</div>'
    +'<div class="srow"><div style="position:relative;flex-shrink:0;">'
    +'<select onchange="S.filterCat=this.value;render()" style="padding:9px 26px 9px 10px;border:1px solid #e0ddd6;border-radius:8px;font-size:14px;background:white;outline:none;appearance:none;-webkit-appearance:none;">'+catOpts+'</select>'
    +'<span style="position:absolute;right:9px;top:50%;transform:translateY(-50%);color:#888;pointer-events:none;font-size:11px;">&#9662;</span></div>'
    +'<input type="text" value="'+esc(S.search)+'" oninput="S.search=this.value;render()" placeholder="Search by name, part #, brand..."></div>'
    +'<div class="pscroll"><table><thead><tr><th>Part #</th><th>Description</th><th style="text-align:right;">Price</th><th style="width:68px;"></th></tr></thead>'
    +'<tbody>'+(prows||'<tr><td colspan="4" style="padding:20px;text-align:center;color:#bbb;font-size:13px;">No parts match</td></tr>')+'</tbody></table></div>'
    +lrows+'</div>'

    +'<div class="card"><div style="display:flex;align-items:center;margin-bottom:12px;">'
    +'<div class="slbl" style="margin-bottom:0;flex:1;">Labor</div>'
    +'<button class="bp" style="padding:8px 13px;font-size:13px;" onclick="addLabor()">+ Add labor</button></div>'
    +(S.labor.length===0?'<div style="color:#bbb;font-size:13px;text-align:center;padding:14px 0;">Click "+ Add labor" to include labor on this proposal</div>':labrows)
    +'</div>'

    +'<div class="card"><div style="display:flex;align-items:center;margin-bottom:12px;">'
    +'<div class="slbl" style="margin-bottom:0;flex:1;">Site photos</div>'
    +'<span style="font-size:12px;color:#aaa;">'+S.photos.length+' photo'+(S.photos.length!==1?'s':'')+'</span></div>'
    +'<div class="pua" ondragover="this.classList.add('drag');event.preventDefault()" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">'
    +'<input type="file" accept="image/*" multiple onchange="handleFiles(this.files)">'
    +'<div style="font-size:28px;margin-bottom:6px;">&#128247;</div>'
    +'<div style="font-size:13px;color:#555;"><strong>Tap to add photos</strong> or drag and drop</div>'
    +'<div style="font-size:12px;color:#aaa;margin-top:3px;">From camera roll or camera &middot; Multiple allowed</div></div>'
    +(S.photos.length?'<div class="pgrid">'+pthumbs+'</div>':'')
    +'</div>'

    +'<div class="card"><div class="slbl">Notes / Terms</div>'
    +'<div class="fld"><textarea oninput="S.notes=this.value" placeholder="Payment terms, warranty, special conditions...">'+esc(S.notes)+'</textarea></div></div>'

    +'<div class="tbar no-print">'
    +'<div class="ti"><div class="tl">Parts</div><div class="tv">'+fmt(pTotal())+'</div></div>'
    +'<div class="tdiv"></div>'
    +'<div class="ti"><div class="tl">Labor</div><div class="tv">'+fmt(lTotal())+'</div></div>'
    +'<div class="tdiv"></div>'
    +'<div class="ti"><div class="tl">Total</div><div class="tg">'+fmt(gTotal())+'</div></div>'
    +'<div class="abtns">'
    +'<button class="bs" onclick="setTab('preview')">Preview</button>'
    +'<button class="bs" onclick="doPrint()">Print / PDF</button>'
    +'<button class="bp" onclick="doEmail()">Email Proposal</button>'
    +'</div></div></div>';
}

function buildPreview(){
  var lrows=S.lines.map(function(l){
    return '<tr><td class="pnum">'+esc(l.pn)+'</td><td>'+esc(l.desc)+'</td>'
      +'<td class="r">'+l.qty+'</td><td class="r">'+(l.unitPrice!=null?fmt(l.unitPrice):"--")+'</td>'
      +'<td class="r" style="font-weight:600;">'+(l.unitPrice!=null?fmt(l.unitPrice*l.qty):"--")+'</td></tr>';
  }).join("");
  var labrows=S.labor.map(function(l){
    return '<tr><td colspan="2">'+esc(l.label)+'</td><td class="r">'+l.hours+'h</td>'
      +'<td class="r">'+fmt(l.rate)+'/hr</td><td class="r" style="font-weight:600;">'+fmt(l.hours*l.rate)+'</td></tr>';
  }).join("");
  var psec="";
  if(S.photos.length){
    psec='<hr class="pdiv"><div class="psl">Site photos</div><div class="ppg">'
      +S.photos.map(function(p){return'<div class="ppi"><img src="'+p.dataUrl+'" alt="site photo"><div class="ppic">'+esc(p.caption||"Site photo")+'</div></div>';}).join("")
      +'</div>';
  }
  var jobmeta='<div style="font-size:13px;color:#555;line-height:2.1;">'
    +'<div><span style="color:#aaa;">Type: </span><strong>'+esc(S.job.type)+'</strong></div>'
    +'<div><span style="color:#aaa;">Date: </span>'+fmtDate(S.job.date)+'</div></div>';

  return '<div class="pvbar no-print">'
    +'<button class="bback" onclick="setTab('estimate')">&#8592; Back</button>'
    +'<div style="flex:1;"></div>'
    +'<button class="bs" onclick="doPrint()" style="padding:9px 14px;">Print / PDF</button>'
    +'<button class="bp" onclick="doEmail()" style="padding:9px 14px;">Email Proposal</button></div>'
    +'<div class="prop">'
    +'<div class="ph"><div>'
    +'<div class="plr"><img src="'+LOGO+'" alt="FIS"><div><div class="pco">Frontline Integration Systems</div><div class="ptag">VETERAN-OWNED &middot; DELAND, FL</div></div></div>'
    +'<div class="pct">bsukovich@frontlineintegration.com<br>Fire Alarm &middot; Access Control &middot; CCTV &middot; Monitoring<br>License # EF20001234 &middot; NICET Certified &middot; SDVOSB</div></div>'
    +'<div><div class="pnl">Proposal</div><div class="pnum-v">'+S.estId+'</div>'
    +'<div class="pmt">Date: '+fmtDate(S.job.date)+'<br>Valid until: '+validUntil()+'</div></div></div>'
    +'<div class="pb">'
    +'<div class="pg2">'
    +'<div><div class="psl">Prepared for</div><div class="pcn">'+(S.co.company||"--")+'</div>'
    +(S.co.contact?'<div class="pcd">'+esc(S.co.contact)+'</div>':'')
    +(S.co.address?'<div class="pcd">'+esc(S.co.address)+'</div>':'')
    +((S.co.city||S.co.state)?'<div class="pcd">'+[S.co.city,S.co.state,S.co.zip].filter(Boolean).map(esc).join(", ")+'</div>':'')
    +(S.co.phone?'<div class="pcd">'+esc(S.co.phone)+'</div>':'')
    +(S.co.email?'<div class="pcd">'+esc(S.co.email)+'</div>':'')+'</div>'
    +'<div><div class="psl">Job details</div>'+jobmeta+'</div></div>'
    +(S.job.scope?'<hr class="pdiv"><div class="psl">Scope of work</div><div style="font-size:13px;color:#444;line-height:1.7;margin-bottom:4px;white-space:pre-wrap;">'+esc(S.job.scope)+'</div>':'')
    +(S.lines.length?'<hr class="pdiv"><div class="psl">Materials</div><table class="ptbl"><thead><tr><th>Part #</th><th>Description</th><th class="r">Qty</th><th class="r">Unit price</th><th class="r">Total</th></tr></thead><tbody>'+lrows+'</tbody></table>':'')
    +(S.labor.length?'<div class="psl">Labor</div><table class="ptbl"><thead><tr><th colspan="2">Description</th><th class="r">Hours</th><th class="r">Rate</th><th class="r">Total</th></tr></thead><tbody>'+labrows+'</tbody></table>':'')
    +'<div class="ptbox"><div class="pti">'
    +'<div class="ptr"><span>Materials</span><span>'+fmt(pTotal())+'</span></div>'
    +'<div class="ptr"><span>Labor</span><span>'+fmt(lTotal())+'</span></div>'
    +'<div class="ptg"><span class="ptgl">Total</span><span class="ptgv">'+fmt(gTotal())+'</span></div>'
    +'</div></div>'
    +(S.notes?'<div class="pnotes"><div class="psl">Notes</div><p>'+esc(S.notes)+'</p></div>':'')
    +psec
    +'<div class="psig">'
    +'<div><div class="psl">Customer acceptance</div><div class="sln"></div>'
    +'<div class="sc">Signature &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Date</div>'
    +'<div class="sln" style="margin-top:18px;"></div><div class="sc">Printed name</div>'
    +'<div class="sn">By signing, customer accepts this proposal. Valid 30 days from proposal date.</div></div>'
    +'<div><div class="psl">Questions?</div>'
    +'<div style="font-size:13px;color:#555;line-height:2.1;">bsukovich@frontlineintegration.com<br>'
    +'<span style="color:#aaa;font-size:12px;">Frontline Integration Systems<br>Veteran-Owned &middot; DeLand, FL<br>License # EF20001234 &middot; NICET Certified</span>'
    +'</div></div></div></div></div>';
}

function setTab(t){S.tab=t;render();if(t==="preview")window.scrollTo(0,0);}
function addPart(pn){var p=PARTS.find(function(x){return x.pn===pn;});var ex=S.lines.find(function(x){return x.pn===pn;});if(ex){ex.qty++;}else{S.lines.push({pn:p.pn,mfr:p.mfr,cat:p.cat,desc:p.desc,qty:1,unitPrice:p.price});}render();}
function updateQty(pn,v){var q=parseInt(v)||0;if(q<=0){S.lines=S.lines.filter(function(l){return l.pn!==pn;});}else{var l=S.lines.find(function(l){return l.pn===pn;});if(l)l.qty=q;}render();}
function updatePrice(pn,v){var l=S.lines.find(function(l){return l.pn===pn;});if(l)l.unitPrice=parseFloat(v)||0;render();}
function removeLine(pn){S.lines=S.lines.filter(function(l){return l.pn!==pn;});render();}
function addLabor(){var p=LABOR_PRESETS[0];S.labor.push({id:Date.now(),label:p.label,hours:p.hours,rate:p.rate});render();}
function updateLabor(id,field,val){var l=S.labor.find(function(l){return l.id===id;});if(!l)return;if(field==="label"){l.label=val;var p=LABOR_PRESETS.find(function(p){return p.label===val;});if(p&&p.hours>0){l.hours=p.hours;l.rate=p.rate;}}else{l[field]=parseFloat(val)||0;}render();}
function removeLabor(id){S.labor=S.labor.filter(function(l){return l.id!==id;});render();}
function handleFiles(files){Array.prototype.forEach.call(files,function(f){var r=new FileReader();r.onload=function(e){S.photos.push({id:Date.now()+Math.random(),dataUrl:e.target.result,caption:""});render();};r.readAsDataURL(f);});}
function handleDrop(e){e.preventDefault();e.currentTarget.classList.remove("drag");var files=Array.prototype.filter.call(e.dataTransfer.files,function(f){return f.type.indexOf("image/")===0;});handleFiles(files);}
function updateCaption(id,val){var p=S.photos.find(function(p){return p.id===id;});if(p)p.caption=val;}
function removePhoto(id){S.photos=S.photos.filter(function(p){return p.id!==id;});render();}
function doPrint(){S.tab="preview";render();setTimeout(function(){window.print();},350);}
function doEmail(){
  var sub=encodeURIComponent("Proposal "+S.estId+" -- "+(S.co.company||"New Customer"));
  var body=encodeURIComponent("Proposal "+S.estId+" for "+(S.co.company||"[Customer]")+"\n\nDate: "+today()+"\nValid until: "+validUntil()+"\n\nParts: "+fmt(pTotal())+"\nLabor: "+fmt(lTotal())+"\nTotal: "+fmt(gTotal())+"\n\nScope: "+(S.job.scope||"See attached proposal.")+"\n\nTo accept, reply to this email or call us.\n\nFrontline Integration Systems\nVeteran-Owned, DeLand FL\nbsukovich@frontlineintegration.com");
  window.open("mailto:bsukovich@frontlineintegration.com?subject="+sub+"&body="+body);
}
render();
</script>
</body>
